<!DOCTYPE html>
<html>
<head th:replace="layout/plantilla :: head">
    <meta charset="UTF-8">
    <title>[[#{docente.pagina}]]</title>
</head>
<body>
<div th:replace="layout/plantilla :: navbar"></div>

<div class="d-flex justify-content-center">

    <div th:replace="layout/menu :: menu"></div>

    <main class="flex-grow-1">
        <section class="content py-4">
            <div class="container-fluid">

                <div class="page-header mb-4">

                    <h1 class="fw-bold text-primary">
                        <i class="fa-solid fa-school me-2"></i>
                        Bienvenido
<!--        <span th:text="${usuario.sexo == 'Masculino'} ? #{inicio.bienvenido} : #{inicio.bienvenida}">-->
<!--            Bienvenido-->
<!--        </span>-->

<!--                        <small class="text-dark">-->
<!--                            <span th:text="${usuario.nombres}">Nombre</span>-->
<!--                            <span th:text="${usuario.apellidos}">Apellido</span>-->
<!--                        </small>-->

                    </h1>

                </div>

                <!-- Carousel -->
                <div id="carouselEscuela" class="carousel slide shadow-lg rounded overflow-hidden"
                     data-bs-ride="carousel">

                    <!-- Indicadores -->
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#carouselEscuela" data-bs-slide-to="0" class="active"></button>
                        <button type="button" data-bs-target="#carouselEscuela" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#carouselEscuela" data-bs-slide-to="2"></button>
                        <button type="button" data-bs-target="#carouselEscuela" data-bs-slide-to="3"></button>
                        <button type="button" data-bs-target="#carouselEscuela" data-bs-slide-to="4"></button>
                        <button type="button" data-bs-target="#carouselEscuela" data-bs-slide-to="5"></button>
                        <button type="button" data-bs-target="#carouselEscuela" data-bs-slide-to="6"></button>
                    </div>

                    <!-- Slides -->
                    <div class="carousel-inner">

                        <div class="carousel-item active">
                            <img th:src="@{/images/imag-escuela/escuela.jpg}"
                                 class="d-block w-100 carousel-img"
                                 alt="Escuela">
                        </div>

                        <div class="carousel-item">
                            <img th:src="@{/images/imag-escuela/img1.jpg}"
                                 class="d-block w-100 carousel-img"
                                 alt="Imagen 1">
                        </div>

                        <div class="carousel-item">
                            <img th:src="@{/images/imag-escuela/img2.jpg}"
                                 class="d-block w-100 carousel-img"
                                 alt="Imagen 2">
                        </div>

                        <div class="carousel-item">
                            <img th:src="@{/images/imag-escuela/img3.jpg}"
                                 class="d-block w-100 carousel-img"
                                 alt="Imagen 3">
                        </div>

                        <div class="carousel-item">
                            <img th:src="@{/images/imag-escuela/img4.jpg}"
                                 class="d-block w-100 carousel-img"
                                 alt="Imagen 4">
                        </div>

                        <div class="carousel-item">
                            <img th:src="@{/images/imag-escuela/img5.jpg}"
                                 class="d-block w-100 carousel-img"
                                 alt="Imagen 5">
                        </div>

                        <div class="carousel-item">
                            <img th:src="@{/images/imag-escuela/img6.jpg}"
                                 class="d-block w-100 carousel-img"
                                 alt="Imagen 6">
                        </div>

                    </div>

                    <!-- Botones -->
                    <button class="carousel-control-prev"
                            type="button"
                            data-bs-target="#carouselEscuela"
                            data-bs-slide="prev">

                        <span class="carousel-control-prev-icon"></span>
                        <span class="visually-hidden">Anterior</span>
                    </button>

                    <button class="carousel-control-next"
                            type="button"
                            data-bs-target="#carouselEscuela"
                            data-bs-slide="next">

                        <span class="carousel-control-next-icon"></span>
                        <span class="visually-hidden">Siguiente</span>
                    </button>

                </div>

                <hr class="my-4">

            </div>
        </section>
    </main>
</div>
<div th:replace="layout/plantilla :: footer"></div>
</body>
</html>
