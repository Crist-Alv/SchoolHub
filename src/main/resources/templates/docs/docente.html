<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Docente</title>
</head>
<body>
<h2>Docente</h2>
<a th:href="@{/}">Inicio</a>
<div th:if="${docentes != null and !docentes.empty}">
    <table border="1">
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Correo</th>
            <th>Telefono</th>
            <th>Editar</th>
            <th>Eliminar</th>
        </tr>
        <tr th:each="docente : ${docentes}">
            <td th:text="${docente.nombresd}">Mostrar Nombre</td>
            <td th:text="${docente.apellidosd}">Mostrar Apellido</td>
            <td th:text="${docente.correo}">Mostrar Correo</td>
            <td th:text="${docente.telefono}">Mostrar Telefono</td>
            <td> <a th:href="@{/editar/} + ${docente.iddocente}" th:text="Editar"/></td>
            <td> <a th:href="@{/eliminar(iddocente=${docente.iddocente})}" th:text="Eliminar"/></td>
        </tr>
    </table>
</div>
<div th:if="${docentes == null or docentes.empty}">
    La lista esta vacia.
</div>
</body>
</html>
